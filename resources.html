<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자료실 — AI Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="resources.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">AI <span>Study</span></a>
      <ul class="nav-links">
        <li><a href="courses.html">강의 소개</a></li>
        <li><a href="resources.html" class="active">자료실</a></li>
      </ul>
      <a href="contact.html" class="nav-cta">강의 문의</a>
    </div>
  </nav>

  <section class="page-hero">
    <div class="page-hero-inner">
      <div class="hero-badge">
        <img src="konkuk.png" alt="건국대학교" class="badge-logo" />
        건국대학교 공학대학원 AI 전공 강의
      </div>
      <h1 class="page-title">자료실</h1>
      <p class="page-desc">강의 자료와 공지사항을 확인하세요.</p>
    </div>
    <div class="bg-grid"></div>
    <div class="bg-blob blob-1"></div>
  </section>

  <section class="board-section">
    <div class="board-wrap">

      <!-- 필터 탭 -->
      <div class="board-tabs">
        <button class="board-tab active" data-filter="all">전체</button>
        <button class="board-tab" data-filter="notice">공지</button>
        <button class="board-tab" data-filter="ml">머신러닝</button>
        <button class="board-tab" data-filter="itg">IT거버넌스</button>
      </div>

      <!-- 게시글 목록 -->
      <div class="board-list" id="boardList">
        <!-- 게시글은 resources.js에서 렌더링 -->
      </div>

      <!-- 빈 상태 -->
      <div class="board-empty" id="boardEmpty" hidden>
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>등록된 자료가 없습니다.</p>
      </div>

      <!-- 자료 업로드 폼 (관리자) -->
      <div class="upload-section">
        <button class="upload-toggle" onclick="toggleUpload()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          자료 등록
        </button>

        <form id="uploadForm" class="upload-form" hidden novalidate>
          <div class="form-grid">
            <div class="field">
              <label for="u-category">분류 <span class="req">*</span></label>
              <select id="u-category" name="category" required>
                <option value="" disabled selected>선택</option>
                <option value="notice">공지</option>
                <option value="ml">머신러닝</option>
                <option value="itg">IT거버넌스</option>
              </select>
            </div>
            <div class="field">
              <label for="u-author">작성자 <span class="req">*</span></label>
              <input type="text" id="u-author" name="author" placeholder="Yang Hee Jung" required />
            </div>
          </div>
          <div class="field">
            <label for="u-title">제목 <span class="req">*</span></label>
            <input type="text" id="u-title" name="title" placeholder="자료 제목을 입력하세요" required />
          </div>
          <div class="field">
            <label for="u-content">내용</label>
            <textarea id="u-content" name="content" placeholder="내용을 입력하세요." rows="4"></textarea>
          </div>
          <div class="field">
            <label for="u-link">파일 링크 (Google Drive)</label>
            <input type="url" id="u-link" name="link" placeholder="https://drive.google.com/..." />
            <p class="field-hint">파일은 Google Drive에 업로드 후 공유 링크를 붙여넣으세요.</p>
          </div>
          <div class="upload-actions">
            <button type="button" class="cancel-btn" onclick="toggleUpload()">취소</button>
            <button type="submit" class="submit-btn">등록하기</button>
          </div>
        </form>
      </div>

    </div>
  </section>

  <!-- 게시글 상세 모달 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="resources.js"></script>
</body>
</html>
