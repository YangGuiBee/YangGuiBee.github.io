<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 거버넌스 논문 관리</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#fff; --line:#e3e6ea; --ink:#1f2733; --sub:#5b6675;

  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;font-size:15px}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 18px 60px}
  header h1{font-size:22px;margin:0 0 4px}
  .meta-line{color:var(--sub);font-size:13px;margin-bottom:2px}
  .badge{display:inline-block;background:var(--brand-weak);color:var(--brand);
    border-radius:20px;padding:2px 12px;font-weight:600;font-size:13px}
  .note{background:#fff8e6;border:1px solid #f2e2b3;color:#7a5b00;
    border-radius:10px;padding:10px 14px;font-size:12.5px;margin:14px 0}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:16px 0}
  .toolbar input[type=text],.toolbar select{padding:9px 12px;border:1px solid var(--line);
    border-radius:9px;font-size:14px;background:#fff;color:var(--ink)}
  .toolbar input[type=text]{flex:1;min-width:200px}
  .btn.refresh{background:#0c9d61}
  .btn.refresh:hover{background:#0a854f}
  .count{color:var(--sub);font-size:13px;margin-left:auto}
  .refresh-msg{margin:0 0 12px;font-size:13px;padding:9px 13px;border-radius:9px;
    background:#eafaf1;border:1px solid #bfe8cf;color:#0a6b41}
  .refresh-msg.warn{background:#fff8e6;border-color:#f2e2b3;color:#7a5b00}
  .drop-info{margin:0 0 12px;font-size:12.5px;color:var(--sub);
    background:#fafbfc;border:1px dashed var(--line);border-radius:9px;padding:10px 13px}
  .drop-info b{color:var(--ink)}
  table{width:100%;border-collapse:collapse;background:var(--card);
    border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  thead th{background:#fafbfc;text-align:left;font-size:12.5px;color:var(--sub);
    padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
  thead th:hover{color:var(--brand)}
  tbody td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:top;font-size:14px}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafcff}
  .t-title{font-weight:600;color:var(--ink);cursor:pointer}
  .t-title:hover{color:var(--brand);text-decoration:underline}
  .col-year{white-space:nowrap;color:var(--sub)}
  .col-org{color:var(--sub)}
  a.src{color:var(--brand);text-decoration:none;font-size:13px}
  a.src:hover{text-decoration:underline}
  .btn{background:var(--brand);color:#fff;border:none;border-radius:8px;
    padding:7px 12px;font-size:13px;cursor:pointer;white-space:nowrap}
  .btn:hover{background:#1f49d6}
  .empty{text-align:center;color:var(--sub);padding:40px}

  .overlay{position:fixed;inset:0;background:rgba(15,20,35,.5);

  .modal{background:#fff;max-width:760px;width:100%;border-radius:16px;
    box-shadow:0 12px 40px rgba(20,30,50,.25);overflow:hidden}
  .modal-head{padding:22px 26px 16px;border-bottom:1px solid var(--line);position:relative}

  .modal-sub{color:var(--sub);font-size:13.5px}
  .modal-sub b{color:var(--ink);font-weight:600}
  .close{position:absolute;top:18px;right:20px;border:none;background:none;
    font-size:24px;color:var(--sub);cursor:pointer;line-height:1}
  .close:hover{color:var(--ink)}
  .chips{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--chip);color:var(--sub);border-radius:14px;padding:2px 10px;font-size:12px}
  .modal-body{padding:20px 26px 26px}
  .field{margin-bottom:16px}
  .field h3{margin:0 0 4px;font-size:13px;color:var(--brand);font-weight:700;
    letter-spacing:.02em;display:flex;align-items:center;gap:6px}
  .field p{margin:0;font-size:14px;color:var(--ink)}
  .brief{background:var(--brand-weak);border-radius:10px;padding:14px 16px}
  .abs{background:#fafbfc;border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;font-size:13.5px;color:var(--sub)}
  details.abs-wrap summary{cursor:pointer;font-size:13px;color:var(--brand);font-weight:600;margin-bottom:8px}
  .modal-foot{padding:16px 26px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
  .ai-tag{font-size:11.5px;color:#9aa3b0}
  @media(max-width:640px){
    .col-org,.col-src{display:none}
    thead th.col-org,thead th.col-src{display:none}
    .wrap{padding:16px 12px 50px}
  }
</style>
</head>

    <span class="count" id="count"></span>
  </div>
  <div id="refreshMsg" class="refresh-msg" style="display:none"></div>
  <input type="file" id="filePick" accept=".json,application/json" style="display:none">
  <div id="dropInfo" class="drop-info" style="display:none"></div>

  <table>
    <thead>
      <tr>
        <th data-sort="title">제목</th>
        <th data-sort="authors">저자</th>
        <th data-sort="year" class="col-year">발행연도</th>
        <th class="col-org">발행기관</th>
        <th class="col-src">원문</th>
        <th>상세</th>

    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">검색 결과가 없습니다.</div>
</div>

<!-- 상세보기 모달 -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

      "keywords":["AI 거버넌스","OECD","UN","G7 히로시마 프로세스","AI 안전정상회의"],
      "abstract":"AI는 사회 및 경제에 새로운 기회와 더불어 도전을 제시하고, 특히 안전 및 보안에 대한 우려를 제기한다. 2022년 11월 ChatGPT 출시 이후로 AI가 수반할 수 있는 위험 및 우려 등 부정적 측면에 대응하기 위한 다양한 관점에서의 AI 거버넌스에 대한 논의가 국가적 차원은 물론 다자간·지역적 국제기구 및 다양한 국제 포럼과 프로세스에서 급부상하고 있다. 본 원고는 OECD의 AI 거버넌스 논의, UN 차원의 규율 논의(UN AI 자문기관 중간보고서, 2024년 결의, 글로벌 디지털 협약(GDC), UNESCO 권고), G7 히로시마 국제 지도원칙·행동강령 및 히로시마 AI 프로세스, AI에 관한 글로벌 파트너십(GPAI), AI 안전정상회의(Bletchley 선언, 서울 정상회의), 한중일 정상회의, 표준개발기구(SDO) 표준 논의 등 국제 차원의 최근 동향과 평가를 제시하고, 각 포럼별 대응 과제와 국내 입법 방향 등 정책적 시사점을 도출한다.",

<script>
(function(){
  var DATA = JSON.parse(document.getElementById('paper-data').textContent);
  var papers = DATA.papers.slice();
  document.getElementById('kw').textContent = DATA.meta.keyword || '';
  document.getElementById('updated').textContent = DATA.meta.lastUpdated || '';
  document.getElementById('note').textContent = 'ℹ️ ' + (DATA.meta.note || '');

  var rows = document.getElementById('rows');
  var empty = document.getElementById('empty');
  var qBox = document.getElementById('q');
  var sortBox = document.getElementById('sort');
  var countBox = document.getElementById('count');
  var overlay = document.getElementById('overlay');
  var modal = document.getElementById('modal');

  function yearNum(y){ return parseFloat(String(y).replace(/[^0-9.]/g,'')) || 0; }

  function esc(s){ return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function apply(){
    var q = qBox.value.trim().toLowerCase();
    var list = papers.filter(function(p){
      if(!q) return true;
      var hay = [p.title,p.authors,p.publisher,p.journal,(p.keywords||[]).join(' ')].join(' ').toLowerCase();
      return hay.indexOf(q) >= 0;
    });
    var s = sortBox.value;
    list.sort(function(a,b){
      if(s==='year-desc') return yearNum(b.year)-yearNum(a.year);
      if(s==='year-asc') return yearNum(a.year)-yearNum(b.year);
      if(s==='title-asc') return a.title.localeCompare(b.title,'ko');
      return 0;
    });
    render(list);
  }

  function render(list){
    countBox.textContent = '총 ' + list.length + '건';
    if(!list.length){ rows.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';
    rows.innerHTML = list.map(function(p){
      var idx = papers.indexOf(p);
      return '<tr>'+
        '<td><span class="t-title" data-i="'+idx+'">'+esc(p.title)+'</span></td>'+
        '<td>'+esc(p.authors)+'</td>'+
        '<td class="col-year">'+esc(p.year)+'</td>'+
        '<td class="col-org">'+esc(p.publisher)+'</td>'+
        '<td class="col-src"><a class="src" href="'+esc(p.url)+'" target="_blank" rel="noopener">DBpia ↗</a></td>'+
        '<td><button class="btn" data-i="'+idx+'">상세보기</button></td>'+
      '</tr>';
    }).join('');
  }

  function field(label, val){
    if(!val) return '';
    return '<div class="field"><h3>'+label+'</h3><p>'+esc(val)+'</p></div>';
  }

  function openDetail(i){
    var p = papers[i]; if(!p) return;
    var sm = p.summary||{};
    var chips = (p.keywords||[]).map(function(k){return '<span class="chip">#'+esc(k)+'</span>';}).join('');
    modal.innerHTML =
      '<div class="modal-head">'+
        '<button class="close" id="x">&times;</button>'+
        '<h2>'+esc(p.title)+'</h2>'+
        '<div class="modal-sub"><b>'+esc(p.authors)+'</b> · '+esc(p.journal||p.publisher)+' · '+esc(p.year)+'</div>'+
        (chips?'<div class="chips">'+chips+'</div>':'')+
      '</div>'+
      '<div class="modal-body">'+
        (sm.brief?'<div class="field"><h3>📝 500자 요약</h3><div class="brief"><p>'+esc(sm.brief)+'</p></div></div>':'')+
        field('🎯 연구목표', sm.goal)+
        field('🔬 연구방법론', sm.method)+
        field('🗂️ 데이터', sm.data)+
        field('🧩 연구모델', sm.model)+
        field('📊 연구결과', sm.result)+
        field('✨ 특징', sm.feature)+
        (p.abstract?'<div class="field"><details class="abs-wrap"><summary>원문 초록 보기</summary><div class="abs">'+esc(p.abstract)+'</div></details></div>':'')+
      '</div>'+
      '<div class="modal-foot">'+
        '<a class="btn" href="'+esc(p.url)+'" target="_blank" rel="noopener">원문(DBpia) 열기 ↗</a>'+
        '<span class="ai-tag">요약 7개 항목은 초록 기반 AI 생성 · 원문 확인 권장</span>'+
      '</div>';
    overlay.classList.add('on');
    document.getElementById('x').onclick = close;
  }
  function close(){ overlay.classList.remove('on'); }

  // events
  rows.addEventListener('click', function(e){
    var t = e.target.closest('[data-i]');
    if(t){ openDetail(parseInt(t.getAttribute('data-i'),10)); }
  });
  overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  qBox.addEventListener('input', apply);
  sortBox.addEventListener('change', apply);
  document.querySelectorAll('thead th[data-sort]').forEach(function(th){
    th.addEventListener('click', function(){
      var key = th.getAttribute('data-sort');
      if(key==='year'){ sortBox.value = (sortBox.value==='year-desc'?'year-asc':'year-desc'); }
      else if(key==='title'){ sortBox.value='title-asc'; }
      apply();
    });
  });

  // ===== [갱신] : 원본 papers.json에서 신규 논문 병합 =====
  var refreshBtn = document.getElementById('refresh');
  var refreshMsg = document.getElementById('refreshMsg');
  var filePick = document.getElementById('filePick');
  var dropInfo = document.getElementById('dropInfo');

  function showMsg(text, warn){
    refreshMsg.textContent = text;
    refreshMsg.className = 'refresh-msg' + (warn?' warn':'');
    refreshMsg.style.display = 'block';
  }

  function mergeData(incoming){
    var have = {};
    papers.forEach(function(p){ have[p.id||p.url] = true; });
    var added = 0;
    (incoming.papers||[]).forEach(function(p){
      var key = p.id||p.url;
      if(!have[key]){ papers.push(p); have[key]=true; added++; }
    });
    if(incoming.meta && incoming.meta.lastUpdated){
      document.getElementById('updated').textContent = incoming.meta.lastUpdated;
    }
    apply();
    if(added>0){
      showMsg('✅ 갱신 완료 · 신규 '+added+'건 추가 (전체 '+papers.length+'건)', false);
      dropInfo.style.display='none';
    } else {
      showMsg('ℹ️ 신규 논문이 없습니다. 현재 최신 상태입니다. (전체 '+papers.length+'건)', false);
    }
  }

  function tryFetch(){
    showMsg('원본 데이터(papers.json)를 확인하는 중…', false);
    fetch('papers.json?ts='+Date.now())
      .then(function(r){ if(!r.ok) throw new Error('not ok'); return r.json(); })
      .then(function(d){ mergeData(d); })
      .catch(function(){
        // file:// 환경에서는 브라우저 보안정책상 자동 읽기가 막힘 → 파일 선택으로 대체
        showMsg('브라우저 보안정책으로 papers.json 자동 읽기가 제한되었습니다. 아래에서 papers.json 파일을 직접 선택해 주세요.', true);
        dropInfo.innerHTML = '📂 같은 폴더의 <b>papers.json</b> 파일을 선택하면 화면에 없던 신규 논문이 목록에 합쳐집니다.';
        dropInfo.style.display='block';
        filePick.click();
      });
  }

  refreshBtn.addEventListener('click', tryFetch);
  filePick.addEventListener('change', function(e){
    var f = e.target.files && e.target.files[0];
    if(!f) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{ mergeData(JSON.parse(reader.result)); }
      catch(err){ showMsg('파일을 읽지 못했습니다. 올바른 papers.json인지 확인해 주세요.', true); }
    };
    reader.readAsText(f, 'utf-8');
    filePick.value='';
  });

  apply();
})();
</script>
</body>
</html>
